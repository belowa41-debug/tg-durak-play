<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дурак Онлайн</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background-color: #1b5e20; font-family: 'Segoe UI', Arial, sans-serif; color: white; margin:0; overflow:hidden; user-select: none; }
        
        #control-panel { position: absolute; top: 15px; left: 20px; display: flex; gap: 15px; align-items: center; z-index: 9999; }
        #status { font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 18px; border-radius: 8px; border-left: 5px solid #00bcd4; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        #timer-box { background: rgba(0,0,0,0.7); padding: 10px 18px; border-radius: 8px; font-weight: bold; border: 1px solid #ffeb3b; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        
        button { padding: 12px 26px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; background:#00bcd4; color:white; transition: background 0.2s; }
        button:hover { background: #00acc1; }
        #invite-btn { background: #4caf50; display: none; }
        #invite-btn:hover { background: #43a047; }
        
        .hand { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: -15px; padding: 15px; bottom: 15px; min-width: 320px; justify-content: center; }
        #enemy-hand { top: 15px; bottom: auto; }
        
        #game-table { position: absolute; top: 50%; left: 42%; transform: translate(-50%, -50%); width: 68%; height: 200px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; display: flex; justify-content: center; align-items: center; gap: 25px; background: rgba(0,0,0,0.05); }
        .card-pair { position: relative; width: 85px; height: 140px; }
        
        .card { width: 85px; height: 125px; background: #ffffff; border-radius: 10px; color: black; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; border: 1px solid #ccc; position: relative; }
        
        .hand .card { margin-right: -20px; }
        .hand .card:hover { transform: translateY(-25px) scale(1.08); z-index: 100 !important; box-shadow: 0 15px 20px rgba(0,0,0,0.4); }
        
        .card .card-corner { font-size: 16px; line-height: 1; display: flex; flex-direction: column; align-items: center; }
        .card .card-center { font-size: 36px; text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); opacity: 0.9; }
        
        .card.is-trump-card { border: 2px solid #ffd700 !important; box-shadow: 0 0 8px rgba(255,215,0,0.4), 0 5px 10px rgba(0,0,0,0.3); }
        
        .card.defense-card { position: absolute; top: 25px; left: 15px; box-shadow: -5px 5px 12px rgba(0,0,0,0.5); z-index: 10; }
        
        .card.shirt { background: linear-gradient(135deg, #1976d2, #0d47a1); border: 2px solid white; cursor: default; }
        .card.shirt::after { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 1px dashed rgba(255,255,255,0.3); border-radius: 6px; }
        .card.shirt * { display: none !important; }
        
        .red { color: #d32f2f; }
        .black { color: #212121; }
        
        #deck-3d-zone { position: absolute; right: 6%; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 500; }
        .deck-stack { position: relative; width: 170px; height: 150px; }
        
        .trump-under { position: absolute; top: 32px; left: -5px; transform: rotate(90deg); transform-origin: center center; z-index: 1; box-shadow: 3px 0 8px rgba(0,0,0,0.3); cursor: default; }
        
        .deck-top-shirt { position: absolute; top: 12px; left: 62px; z-index: 10; cursor: default; }
        .deck-counter-badge { background: rgba(0,0,0,0.75); border: 1px solid gold; padding: 5px 14px; border-radius: 12px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        #action-btn { z-index: 1000; font-size: 16px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 10000; flex-direction: column; }
        #overlay h1 { font-size: 36px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="control-panel">
        <div id="status">Подключение к игре...</div>
        <button id="invite-btn" onclick="copyLink()">✉️ Позвать друга</button>
        <div id="timer-box">⏱️ Ход: <span id="timer-seconds">60</span>с</div>
        <button id="action-btn" style="display:none;" onclick="socket.emit('actionButton')"></button>
    </div>
    
    <div id="enemy-hand" class="hand"></div>
    <div id="game-table"></div>
    <div id="player-hand" class="hand"></div>
    
    <div id="deck-3d-zone" style="display:none;">
        <div class="deck-stack">
            <div id="visual-trump" class="card trump-under"></div>
            <div id="visual-shirt" class="card shirt deck-top-shirt"></div>
        </div>
        <div class="deck-counter-badge">Осталось: <span id="deck-count-num">0</span></div>
    </div>
    
    <div id="overlay">
        <h1 id="overlay-text"></h1>
        <button onclick="location.reload()">Играть снова</button>
    </div>

    <script>
        const socket = io({ transports: ['websocket', 'polling'] });
        let roomId = window.location.hash.substring(1);
        if (!roomId) { roomId = Math.random().toString(36).substring(2, 7); window.location.hash = roomId; }

        function copyLink() {
            const fullLink = window.location.origin + window.location.pathname + '#' + roomId;
            navigator.clipboard.writeText(fullLink).then(() => alert("Ссылка скопирована!"));
        }

        socket.emit('joinRoom', roomId);
        
        socket.on('status', (text) => { 
            document.getElementById('status').innerText = text;
            document.getElementById('invite-btn').style.display = text.includes("Ожидаем") ? 'block' : 'none';
        });

        socket.on('timerUpdate', (data) => {
            const timerBox = document.getElementById('timer-box');
            timerBox.style.display = 'block';
            document.getElementById('timer-seconds').innerText = data.timeLeft;
            timerBox.style.borderColor = (data.activeId === socket.id) ? "#ff5722" : "#4caf50";
        });

        socket.on('gameState', (data) => {
            document.getElementById('invite-btn').style.display = 'none';
            document.getElementById('deck-3d-zone').style.display = 'flex';
            
            const statusEl = document.getElementById('status');
            if (data.isMyActiveTurn) {
                statusEl.innerText = data.isAttacker ? "ТВОЙ ХОД: Ходи или подкидывай!" : "ТВОЙ ХОД: Отбивайся!";
                statusEl.style.borderLeftColor = "#ffeb3b";
            } else {
                statusEl.innerText = data.isAttacker ? "Ожидание защиты соперника..." : "Ожидание хода соперника...";
                statusEl.style.borderLeftColor = "#00bcd4";
            }
            
            document.getElementById('deck-count-num').innerText = data.deckCount;
            
            if (data.trump) {
                const vt = document.getElementById('visual-trump');
                vt.className = `card trump-under ${data.trump.suit.color} is-trump-card`;
                vt.innerHTML = `<div class="card-corner"><div>${data.trump.value.name}</div><div>${data.trump.suit.symbol}</div></div><div class="card-center">${data.trump.suit.symbol}</div>`;
            }
            
            document.getElementById('visual-shirt').style.display = data.deckCount > 1 ? 'block' : 'none';
            document.getElementById('visual-trump').style.display = data.deckCount > 0 ? 'block' : 'none';
            
            const actBtn = document.getElementById('action-btn');
            if (data.table.length > 0) {
                actBtn.style.display = 'block';
                if (data.isAttacker) {
                    const allBeaten = data.table.every(p => p.defense !== null);
                    actBtn.innerText = "Бито";
                    actBtn.style.background = allBeaten ? "#4caf50" : "#777777";
                } else {
                    actBtn.innerText = "Взять карты";
                    actBtn.style.background = "#e65100";
                }
            } else {
                actBtn.style.display = 'none';
            }
            
            const myHandDiv = document.getElementById('player-hand');
            myHandDiv.innerHTML = '';
            data.myHand.forEach((card, idx) => {
                const cardEl = document.createElement('div');
                const isTrump = data.trump && (card.suit.id === data.trump.suit.id);
                cardEl.className = `card ${card.suit.color} ${isTrump ? 'is-trump-card' : ''}`;
                cardEl.style.zIndex = idx;
                cardEl.innerHTML = `<div class="card-corner"><div>${card.value.name}</div><div>${card.suit.symbol}</div></div><div class="card-center">${card.suit.symbol}</div>`;
                cardEl.onclick = () => socket.emit('playCard', idx);
                myHandDiv.appendChild(cardEl);
            });
            
            const enemyHandDiv = document.getElementById('enemy-hand');
            enemyHandDiv.innerHTML = '';
            for(let i = 0; i < data.enemyCardCount; i++) {
                const shirt = document.createElement('div');
                shirt.className = 'card shirt';
                shirt.style.zIndex = i;
                enemyHandDiv.appendChild(shirt);
            }
            
            const tableDiv = document.getElementById('game-table');
            tableDiv.innerHTML = '';
            data.table.forEach(pair => {
                const pairDiv = document.createElement('div');
                pairDiv.className = 'card-pair';
                
                const attCard = document.createElement('div');
                const isAttTrump = data.trump && (pair.attack.suit.id === data.trump.suit.id);
                attCard.className = `card ${pair.attack.suit.color} ${isAttTrump ? 'is-trump-card' : ''}`;
                attCard.innerHTML = `<div class="card-corner"><div>${pair.attack.value.name}</div><div>${pair.attack.suit.symbol}</div></div><div class="card-center">${pair.attack.suit.symbol}</div>`;
                pairDiv.appendChild(attCard);
                
                if (pair.defense) {
                    const defCard = document.createElement('div');
                    const isDefTrump = data.trump && (pair.defense.suit.id === data.trump.suit.id);
                    defCard.className = `card defense-card ${pair.defense.suit.color} ${isDefTrump ? 'is-trump-card' : ''}`;
                    defCard.innerHTML = `<div class="card-corner"><div>${pair.defense.value.name}</div><div>${pair.defense.suit.symbol}</div></div><div class="card-center">${pair.defense.suit.symbol}</div>`;
                    pairDiv.appendChild(defCard);
                }
                tableDiv.appendChild(pairDiv);
            });
        });

        socket.on('gameOver', (data) => {
            document.getElementById('timer-box').style.display = 'none';
            const overlay = document.getElementById('overlay');
            const text = document.getElementById('overlay-text');
            overlay.style.display = 'flex';
            
            let message = data.winner === socket.id ? "Вы выиграли! 🎉" : "Вы проиграли... Дурак! 🥺";
            if (data.reason === 'timeout') {
                message += data.winner === socket.id ? " (Соперник превысил лимит времени)" : " (Время на ход истекло)";
            }
            if (data.winner === 'draw') message = "Ничья! 🤝";
            
            text.innerText = message;
        });
    </script>
</body>
</html>
