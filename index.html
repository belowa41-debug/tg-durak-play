<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дурак Онлайн</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background-color: #1b5e20; font-family: 'Segoe UI', Arial, sans-serif; color: white; margin:0; overflow:hidden; user-select: none; }
        
        #control-panel { position: absolute; top: 15px; left: 20px; display: flex; gap: 15px; align-items: center; z-index: 9999; }
        #status { font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 18px; border-radius: 8px; border-left: 5px solid #00bcd4; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        #timer-box { background: rgba(0,0,0,0.7); padding: 10px 18px; border-radius: 8px; font-weight: bold; border: 1px solid #ffeb3b; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        
        button { padding: 12px 26px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; background:#00bcd4; color:white; transition: background 0.2s; }
        button:hover { background: #00acc1; }
        #invite-btn { background: #4caf50; display: none; }
        
        .hand { position: absolute; left: 50%; transform: translateX(-50%); display: flex; padding: 15px; bottom: 15px; min-width: 320px; justify-content: center; }
        #enemy-hand { top: 15px; bottom: auto; }
        
        #game-table { position: absolute; top: 50%; left: 42%; transform: translate(-50%, -50%); width: 68%; height: 200px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; display: flex; justify-content: center; align-items: center; gap: 25px; background: rgba(0,0,0,0.05); }
        .card-pair { position: relative; width: 85px; height: 140px; }
        
        .card { width: 85px; height: 125px; background: #ffffff; border-radius: 10px; color: black; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; border: 1px solid #ccc; position: relative; }
        .hand .card { margin-right: -20px; }
        .hand .card:hover { transform: translateY(-25px) scale(1.08); z-index: 100 !important; box-shadow: 0 15px 20px rgba(0,0,0,0.4); }
        
        .card .card-corner { font-size: 16px; line-height: 1; display: flex; flex-direction: column; align-items: center; }
        .card .card-center { font-size: 36px; text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); opacity: 0.9; }
        .card.is-trump-card { border: 2px solid #ffd700 !important; }
        .card.defense-card { position: absolute; top: 25px; left: 15px; box-shadow: -5px 5px 12px rgba(0,0,0,0.5); z-index: 10; }
        .card.shirt { background: linear-gradient(135deg, #1976d2, #0d47a1); border: 2px solid white; cursor: default; }
        .card.shirt::after { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 1px dashed rgba(255,255,255,0.3); border-radius: 6px; }
        .card.shirt * { display: none !important; }
        
        .red { color: #d32f2f; }
        .black { color: #212121; }
        
        #deck-3d-zone { position: absolute; right: 6%; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 500; }
        .deck-stack { position: relative; width: 140px; height: 130px; display: flex; justify-content: flex-start; align-items: center; }
        .trump-under { position: absolute; transform: rotate(90deg) translateX(0px) translateY(25px); z-index: 1; box-shadow: 3px 0 8px rgba(0,0,0,0.3); cursor: default; }
        .deck-top-shirt { position: absolute; top: 0; left: 0; z-index: 10; cursor: default; box-shadow: -2px 2px 6px rgba(0,0,0,0.4); }
        .deck-counter-badge { background: rgba(0,0,0,0.75); border: 1px solid gold; padding: 5px 14px; border-radius: 12px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="control-panel">
        <div id="status">Подключение...</div>
        <button id="invite-btn" onclick="copyLink()">✉️ Позвать друга</button>
        <div id="timer-box">⏱️ Ход: <span id="timer-seconds">60</span>с</div>
        <button id="action-btn" style="display:none;" onclick="socket.emit('actionButton')"></button>
    </div>
    <div id="enemy-hand" class="hand"></div>
    <div id="game-table"></div>
    <div id="player-hand" class="hand"></div>
    <div id="deck-3d-zone" style="display:none;">
        <div class="deck-stack">
            <div id="visual-trump" class="card trump-under"></div>
            <div id="visual-shirt" class="card shirt deck-top-shirt"></div>
        </div>
        <div class="deck-counter-badge">Карт: <span id="deck-count-num">0</span></div>
    </div>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); display:none; justify-content:center; align-items:center; z-index:10000; flex-direction:column;">
        <h1 id="overlay-text"></h1>
        <button onclick="location.reload()">Играть снова</button>
    </div>

    <script>
        const socket = io({ transports: ['websocket', 'polling'] });
        let roomId = window.location.hash.substring(1);
        if (!roomId) { roomId = Math.random().toString(36).substring(2, 7); window.location.hash = roomId; }
        function copyLink() { const fullLink = window.location.origin + window.location.pathname + '#' + roomId; navigator.clipboard.writeText(fullLink).then(() => alert("Ссылка скопирована!")); }
        socket.emit('joinRoom', roomId);

        socket.on('timerUpdate', (data) => {
            document.getElementById('timer-box').style.display = 'block';
            document.getElementById('timer-seconds').innerText = data.timeLeft;
            document.getElementById('timer-box').style.borderColor = (data.activeId === socket.id) ? "#ff5722" : "#4caf50";
        });

        socket.on('gameState', (data) => {
            document.getElementById('deck-3d-zone').style.display = 'flex';
            const statusEl = document.getElementById('status');
            statusEl.innerText = data.isMyActiveTurn ? (data.isAttacker ? "ТВОЙ ХОД: Атакуй!" : "ТВОЙ ХОД: Отбивайся!") : "Ожидание...";
            
            document.getElementById('deck-count-num').innerText = data.deckCount;
            const vt = document.getElementById('visual-trump');
            if (data.trump) {
                if (data.deckCount === 0) {
                    vt.style.opacity = '0.3'; vt.style.border = '2px dashed rgba(255,255,255,0.4)'; vt.style.background = 'transparent';
                    vt.innerHTML = `<div class="card-center" style="font-size:48px; position:absolute; top:20px; left:20px;">${data.trump.suit.symbol}</div>`;
                } else {
                    vt.style.opacity = '1'; vt.style.background = '#ffffff'; vt.style.border = '1px solid #ccc';
                    vt.className = `card trump-under ${data.trump.suit.color} is-trump-card`;
                    vt.innerHTML = `<div class="card-corner"><div>${data.trump.value.name}</div><div>${data.trump.suit.symbol}</div></div><div class="card-center">${data.trump.suit.symbol}</div>`;
                }
            }
            document.getElementById('visual-shirt').style.display = data.deckCount > 1 ? 'block' : 'none';
            
            const actBtn = document.getElementById('action-btn');
            if(data.table.length > 0) { actBtn.style.display = 'block'; actBtn.innerText = data.isAttacker ? "Бито" : "Взять"; actBtn.style.background = data.isAttacker ? (data.table.every(p => p.defense) ? "#4caf50" : "#777") : "#e65100"; } else { actBtn.style.display = 'none'; }
            
            const myHand = document.getElementById('player-hand'); myHand.innerHTML = '';
            data.myHand.forEach((c, i) => { const el = document.createElement('div'); el.className = `card ${c.suit.color} ${data.trump && c.suit.id === data.trump.suit.id ? 'is-trump-card' : ''}`; el.innerHTML = `<div class="card-corner"><div>${c.value.name}</div><div>${c.suit.symbol}</div></div><div class="card-center">${c.suit.symbol}</div>`; el.onclick = () => socket.emit('playCard', i); myHand.appendChild(el); });
            const table = document.getElementById('game-table'); table.innerHTML = '';
            data.table.forEach(p => { const pair = document.createElement('div'); pair.className = 'card-pair'; const att = document.createElement('div'); att.className = `card ${p.attack.suit.color}`; att.innerHTML = `<div class="card-corner"><div>${p.attack.value.name}</div><div>${p.attack.suit.symbol}</div></div><div class="card-center">${p.attack.suit.symbol}</div>`; pair.appendChild(att); if(p.defense){ const def = document.createElement('div'); def.className = `card defense-card ${p.defense.suit.color}`; def.innerHTML = `<div class="card-corner"><div>${p.defense.value.name}</div><div>${p.defense.suit.symbol}</div></div><div class="card-center">${p.defense.suit.symbol}</div>`; pair.appendChild(def); } table.appendChild(pair); });
        });

        socket.on('gameOver', (d) => { document.getElementById('overlay').style.display = 'flex'; document.getElementById('overlay-text').innerText = d.winner === socket.id ? "Вы выиграли! 🎉" : "Вы проиграли... Дурак! 🥺"; });
    </script>
</body>
</html>
