<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дурак Онлайн</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background-color: #1b5e20; font-family: sans-serif; color: white; margin:0; overflow:hidden; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; z-index: 1000; }
        .card { width: 70px; height: 100px; background: white; color: black; border-radius: 5px; display: inline-block; margin: 2px; text-align: center; line-height: 100px; font-weight: bold; cursor: pointer; }
        .red { color: red; }
        /* Колода */
        #deck-zone { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); text-align: center; }
        .card-deck { width: 70px; height: 100px; background: blue; border: 2px solid white; border-radius: 5px; }
        .card-trump { width: 70px; height: 100px; background: white; border: 2px solid gold; border-radius: 5px; margin-top: -80px; transform: rotate(90deg); }
    </style>
</head>
<body>
    <div id="status">Подключение...</div>
    <div id="enemy-hand" style="position:absolute; top:10px; left:50%; transform:translateX(-50%);"></div>
    <div id="game-table" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:flex; gap:10px;"></div>
    <div id="player-hand" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);"></div>
    
    <div id="deck-zone">
        <div id="visual-trump" class="card-trump"></div>
        <div id="visual-shirt" class="card-deck"></div>
        <div id="deck-count">Карт: 0</div>
    </div>

    <script>
        const socket = io({ transports: ['websocket', 'polling'] });
        socket.on('connect', () => { document.getElementById('status').innerText = "Подключено!"; });
        
        socket.on('gameState', (data) => {
            document.getElementById('status').innerText = data.isMyActiveTurn ? "Твой ход" : "Ждем";
            document.getElementById('deck-count').innerText = "Карт: " + data.deckCount;
            
            // Рука
            const hand = document.getElementById('player-hand'); hand.innerHTML = '';
            data.myHand.forEach((c, i) => {
                const el = document.createElement('div');
                el.className = `card ${c.suit.color}`;
                el.innerText = c.value.name + c.suit.symbol;
                el.onclick = () => socket.emit('playCard', i);
                hand.appendChild(el);
            });

            // Козырь (всегда виден)
            const trump = document.getElementById('visual-trump');
            trump.innerText = data.trump ? data.trump.value.name + data.trump.suit.symbol : "";
            trump.className = data.trump ? `card-trump ${data.trump.suit.color}` : 'card-trump';
            
            // Если колода пуста, меняем стиль козыря
            trump.style.opacity = data.deckCount === 0 ? "0.5" : "1";
        });
    </script>
</body>
</html>
