<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дурак Онлайн</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1b5e20; font-family: 'Segoe UI', Arial, sans-serif; color: white; margin:0; overflow:hidden; user-select: none; }
        
        #control-panel { position: absolute; top: 15px; left: 20px; display: flex; gap: 15px; align-items: center; z-index: 9999; }
        #status { font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 18px; border-radius: 8px; border-left: 5px solid #00bcd4; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        #timer-box { background: rgba(0,0,0,0.7); padding: 10px 18px; border-radius: 8px; font-weight: bold; border: 1px solid #ffeb3b; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        
        button { padding: 12px 26px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; background:#00bcd4; color:white; transition: background 0.2s; }
        button:hover { background: #00acc1; }
        #invite-btn { background: #4caf50; display: none; }
        #invite-btn:hover { background: #43a047; }
        #back-btn { background: #607d8b; display: none; }
        #back-btn:hover { background: #546e7a; }
        
        .hand { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: -15px; padding: 15px; bottom: 15px; min-width: 320px; justify-content: center; }
        #enemy-hand { top: 15px; bottom: auto; }
        
        #game-table { position: absolute; top: 50%; left: 42%; transform: translate(-50%, -50%); width: 68%; height: 220px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; display: flex; justify-content: center; align-items: center; gap: 25px; background: rgba(0,0,0,0.05); }
        .card-pair { position: relative; width: 125px; height: 165px; }
        
        .card { width: 85px; height: 125px; background: linear-gradient(145deg, #ffffff, #f3f3f3); border-radius: 10px; color: black; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; border: 1px solid #ccc; position: relative; }
        
        .hand .card { margin-right: -20px; }
        .hand .card:hover { transform: translateY(-25px) scale(1.08); z-index: 100 !important; box-shadow: 0 15px 20px rgba(0,0,0,0.4); }
        
        .card .card-corner { font-size: 16px; line-height: 1; display: flex; flex-direction: column; align-items: center; }
        .card .card-center { font-size: 36px; text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); opacity: 0.9; }
        
        .card.is-trump-card { border: 2px solid #ffd700 !important; box-shadow: 0 0 8px rgba(255,215,0,0.4), 0 5px 10px rgba(0,0,0,0.3); }
        
        .card.attack-card { transform: rotate(-7deg); z-index: 1; }
        .card.defense-card { position: absolute; top: 34px; left: 34px; transform: rotate(9deg); box-shadow: -5px 5px 12px rgba(0,0,0,0.5); z-index: 10; }
        
        .card.shirt { background: linear-gradient(135deg, #1976d2, #0d47a1); border: 2px solid white; cursor: default; }
        .card.shirt::after { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 1px dashed rgba(255,255,255,0.3); border-radius: 6px; }
        .card.shirt * { display: none !important; }
        
        .red { color: #d32f2f; }
        .black { color: #212121; }
        
        #deck-3d-zone { position: absolute; right: 6%; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 500; }
        .deck-stack { position: relative; width: 170px; height: 150px; }
        
        /* Козырная карта выступает из-под колоды, чтобы ее было видно */
        .trump-under { position: absolute; top: 32px; left: -5px; transform: rotate(90deg); transform-origin: center center; z-index: 1; box-shadow: 3px 0 8px rgba(0,0,0,0.3); cursor: default; }
        
        /* Закрывающая её сверху основная колода рубашкой вверх */
        .deck-top-shirt { position: absolute; top: 12px; left: 62px; z-index: 10; cursor: default; }
        .deck-counter-badge { background: rgba(0,0,0,0.75); border: 1px solid gold; padding: 5px 14px; border-radius: 12px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .trump-info-badge { background: rgba(255,255,255,0.92); color: #212121; border: 2px solid #ffd700; padding: 6px 14px; border-radius: 12px; font-size: 16px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        #action-btn { z-index: 1000; font-size: 16px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 10000; flex-direction: column; }
        #overlay h1 { font-size: 36px; margin-bottom: 20px; }
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, rgba(46,125,50,0.96), rgba(7,45,12,0.98)); z-index: 9000; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .start-card { width: min(420px, 100%); background: rgba(0,0,0,0.62); border: 2px solid rgba(255,255,255,0.18); border-radius: 22px; padding: 28px; box-shadow: 0 18px 40px rgba(0,0,0,0.45); text-align: center; }
        .start-card h1 { margin: 0 0 8px; font-size: 34px; }
        .start-card p { margin: 0 0 22px; color: rgba(255,255,255,0.82); font-size: 15px; line-height: 1.45; }
        .start-menu { display: flex; flex-direction: column; gap: 12px; }
        .start-menu button { width: 100%; font-size: 17px; padding: 14px 18px; }
        .stars-balance-panel { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.55); border-radius: 14px; padding: 12px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .stars-balance-panel strong { font-size: 18px; color: #ffd54f; }
        .stars-balance-panel button { width: auto; padding: 8px 12px; font-size: 13px; background: #ff9800; }
        .start-random-btn { background: #00bcd4; }
        .start-friend-btn { background: #4caf50; }
        .start-stars-btn { background: linear-gradient(135deg, #ffb300, #ff6f00); }
        .start-exit-btn { background: #616161; }

        @media (max-width: 700px) {
            #control-panel { top: 8px; left: 8px; right: 8px; flex-wrap: wrap; gap: 6px; }
            #status { padding: 8px 10px; font-size: 13px; }
            #timer-box { padding: 8px 10px; font-size: 13px; }
            button { padding: 9px 12px; font-size: 13px; }

            .card { width: 56px; height: 82px; border-radius: 7px; padding: 5px; }
            .card .card-corner { font-size: 12px; }
            .card .card-center { font-size: 24px; }

            .hand { left: 0; right: 0; transform: none; width: 100%; min-width: 0; box-sizing: border-box; justify-content: flex-start; gap: 6px; padding: 6px 10px; overflow-x: auto; overflow-y: visible; }
            .hand .card { flex: 0 0 auto; margin-right: 0; }
            .hand .card:hover { transform: translateY(-10px) scale(1.03); }
            #enemy-hand { top: 72px; bottom: auto; }
            #player-hand { bottom: 6px; }

            #game-table { top: 46%; left: 50%; width: 94%; height: 145px; gap: 10px; padding: 10px; box-sizing: border-box; justify-content: flex-start; overflow-x: auto; overflow-y: hidden; }
            .card-pair { width: 88px; height: 110px; flex: 0 0 88px; }
            .card.defense-card { top: 22px; left: 22px; }
            .card.attack-card { transform: rotate(-6deg); }

            #deck-3d-zone { right: 8px; top: 61%; gap: 7px; }
            .deck-stack { width: 112px; height: 86px; }
            .trump-under { top: 20px; left: -8px; }
            .deck-top-shirt { top: 4px; left: 48px; }
            .deck-counter-badge, .trump-info-badge { padding: 4px 8px; font-size: 12px; }
            .start-card { padding: 22px; border-radius: 18px; }
            .start-card h1 { font-size: 28px; }
            .start-menu button { font-size: 15px; padding: 13px 14px; }
            .stars-balance-panel { flex-direction: column; align-items: stretch; }
            .stars-balance-panel button { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="start-card">
            <h1>Дурак Онлайн</h1>
            <p>Нажми “Начать игру” для случайного соперника, пригласи друга или выбери режим Telegram Stars.</p>
            <div class="stars-balance-panel">
                <div>Баланс: <strong><span id="stars-balance">0</span> ⭐</strong></div>
                <button onclick="buyStars()">Пополнить</button>
            </div>
            <div class="start-menu">
                <button class="start-random-btn" onclick="startRandomGame()">▶️ Начать игру</button>
                <button class="start-friend-btn" onclick="startFriendGame()">✉️ Позвать друга</button>
                <button class="start-stars-btn" onclick="startStarsGame()">⭐ Играть за Stars</button>
                <button class="start-exit-btn" onclick="exitGame()">🚪 Выйти</button>
            </div>
        </div>
    </div>

    <div id="control-panel">
        <div id="status">Подключение к игре...</div>
        <button id="invite-btn" onclick="copyLink()">✉️ Позвать друга</button>
        <button id="back-btn" onclick="returnToMenu()">⬅️ Назад</button>
        <div id="timer-box">⏱️ Ход: <span id="timer-seconds">60</span>с</div>
        <button id="action-btn" style="display:none;" onclick="socket.emit('actionButton')"></button>
    </div>
    
    <div id="enemy-hand" class="hand"></div>
    <div id="game-table"></div>
    <div id="player-hand" class="hand"></div>
    
    <div id="deck-3d-zone" style="display:none;">
        <div class="deck-stack">
            <div id="visual-trump" class="card trump-under"></div>
            <div id="visual-shirt" class="card shirt deck-top-shirt"></div>
        </div>
        <div class="deck-counter-badge">Осталось: <span id="deck-count-num">0</span></div>
        <div class="trump-info-badge">Козырь: <span id="trump-name">--</span></div>
    </div>
    
    <div id="overlay">
        <h1 id="overlay-text"></h1>
        <button onclick="location.reload()">Играть снова</button>
    </div>

    <script>
        const TELEGRAM_APP_URL = 'https://t.me/my_durak_play_bot/game';
        const telegramWebApp = window.Telegram && window.Telegram.WebApp;

        if (telegramWebApp) {
            telegramWebApp.ready();
            telegramWebApp.expand();
        }

        function normalizeRoomId(value) {
            const cleanValue = (value || '').replace(/[^a-zA-Z0-9_-]/g, '');
            return cleanValue.substring(0, 64);
        }

        function getTelegramStartParam() {
            const params = new URLSearchParams(window.location.search);
            const hashValue = window.location.hash.substring(1);
            const hashParams = hashValue.includes('=') ? new URLSearchParams(hashValue) : new URLSearchParams();

            return normalizeRoomId(
                (telegramWebApp && telegramWebApp.initDataUnsafe && telegramWebApp.initDataUnsafe.start_param) ||
                params.get('tgWebAppStartParam') ||
                params.get('startapp') ||
                hashParams.get('tgWebAppStartParam') ||
                hashParams.get('startapp')
            );
        }

        function getHashRoomId() {
            const hashValue = window.location.hash.substring(1);
            return hashValue.includes('=') ? '' : normalizeRoomId(hashValue);
        }

        const socket = io({ transports: ['websocket', 'polling'] });
        let roomId = getTelegramStartParam() || getHashRoomId();
        let hasJoinedGame = false;
        let starsBalance = 0;
        let starsPaymentsEnabled = false;

        socket.emit('registerPlayer', {
            initData: telegramWebApp ? telegramWebApp.initData : '',
            user: telegramWebApp && telegramWebApp.initDataUnsafe ? telegramWebApp.initDataUnsafe.user : null
        });

        function createRoomId() {
            return Math.random().toString(36).substring(2, 7);
        }

        function hideStartScreen() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';
        }

        function showStartScreen() {
            document.getElementById('start-screen').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('invite-btn').style.display = 'none';
            document.getElementById('timer-box').style.display = 'none';
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('deck-3d-zone').style.display = 'none';
            document.getElementById('enemy-hand').innerHTML = '';
            document.getElementById('player-hand').innerHTML = '';
            document.getElementById('game-table').innerHTML = '';
            document.getElementById('status').innerText = "Выберите режим игры";
        }

        function setRoomId(nextRoomId) {
            roomId = normalizeRoomId(nextRoomId);
            if (roomId && window.location.hash.substring(1) !== roomId) { window.location.hash = roomId; }
        }

        function joinRoom(nextRoomId) {
            if (hasJoinedGame) return;

            setRoomId(nextRoomId);
            if (!roomId) return;

            hasJoinedGame = true;
            hideStartScreen();
            socket.emit('joinRoom', roomId);
        }

        function startRandomGame(statusText = "Ищем случайного соперника...") {
            if (hasJoinedGame) return;

            hasJoinedGame = true;
            hideStartScreen();
            window.location.hash = '';
            document.getElementById('status').innerText = statusText;
            socket.emit('findRandomGame');
        }

        function startFriendGame() {
            joinRoom(roomId || createRoomId());
            copyLink();
        }

        function startStarsGame() {
            if (starsBalance < 1) {
                showMessage("Для игры за Stars нужен минимум 1 ⭐ на балансе.");
                buyStars();
                return;
            }

            socket.emit('startStarsGame');
        }

        function exitGame() {
            if (telegramWebApp) {
                telegramWebApp.close();
                return;
            }

            if (window.history.length > 1) {
                window.history.back();
            } else {
                alert("Можно закрыть вкладку браузера.");
            }
        }

        function returnToMenu() {
            if (hasJoinedGame) {
                socket.emit('leaveGame');
            }

            hasJoinedGame = false;
            roomId = '';
            window.location.hash = '';
            showStartScreen();
        }

        function buyStars(amount = 10) {
            if (!starsPaymentsEnabled) {
                showMessage("Оплата Stars пока недоступна: нужно настроить BOT_TOKEN на сервере и открыть игру через Telegram.");
                return;
            }

            socket.emit('buyStars', amount);
        }

        function showMessage(message) {
            if (telegramWebApp && telegramWebApp.showAlert) {
                telegramWebApp.showAlert(message);
            } else {
                alert(message);
            }
        }

        function getInviteLink() {
            return `${TELEGRAM_APP_URL}?startapp=${encodeURIComponent(roomId)}`;
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }

            return new Promise((resolve, reject) => {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.opacity = '0';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    document.execCommand('copy') ? resolve() : reject();
                } catch (error) {
                    reject(error);
                } finally {
                    document.body.removeChild(textArea);
                }
            });
        }

        function copyLink() {
            const fullLink = getInviteLink();
            copyTextToClipboard(fullLink)
                .then(() => alert("Ссылка Telegram скопирована!"))
                .catch(() => prompt("Скопируйте ссылку:", fullLink));
        }

        if (roomId) { joinRoom(roomId); }

        socket.on('starsBalance', (data) => {
            starsBalance = data.balance || 0;
            starsPaymentsEnabled = Boolean(data.paymentsEnabled && data.registered);
            document.getElementById('stars-balance').innerText = starsBalance;
        });

        socket.on('starsInvoice', (data) => {
            if (telegramWebApp && telegramWebApp.openInvoice) {
                telegramWebApp.openInvoice(data.url, (status) => {
                    if (status === 'paid') {
                        showMessage("Оплата прошла. Баланс обновится автоматически.");
                    }
                });
            } else {
                window.open(data.url, '_blank');
            }
        });

        socket.on('starsError', (message) => {
            showMessage(message);
        });

        socket.on('starsGameReady', () => {
            startRandomGame("Ищем соперника для игры за Stars...");
        });
        
        socket.on('status', (text) => { 
            document.getElementById('status').innerText = text;
            document.getElementById('invite-btn').style.display = text.includes("Ожидаем") ? 'block' : 'none';
        });

        socket.on('timerUpdate', (data) => {
            const timerBox = document.getElementById('timer-box');
            timerBox.style.display = 'block';
            document.getElementById('timer-seconds').innerText = data.timeLeft;
            timerBox.style.borderColor = (data.activeId === socket.id) ? "#ff5722" : "#4caf50";
        });

        socket.on('gameState', (data) => {
            document.getElementById('invite-btn').style.display = 'none';
            document.getElementById('deck-3d-zone').style.display = 'flex';
            
            const statusEl = document.getElementById('status');
            if (data.isMyActiveTurn) {
                statusEl.innerText = data.isAttacker ? "ТВОЙ ХОД: Ходи или подкидывай!" : "ТВОЙ ХОД: Отбивайся!";
                statusEl.style.borderLeftColor = "#ffeb3b";
            } else {
                statusEl.innerText = data.isAttacker ? "Ожидание защиты соперника..." : "Ожидание хода соперника...";
                statusEl.style.borderLeftColor = "#00bcd4";
            }
            
            document.getElementById('deck-count-num').innerText = data.deckCount;
            
            if (data.trump) {
                const vt = document.getElementById('visual-trump');
                const trumpName = document.getElementById('trump-name');
                vt.className = `card trump-under ${data.trump.suit.color} is-trump-card`;
                vt.innerHTML = `<div class="card-corner"><div>${data.trump.value.name}</div><div>${data.trump.suit.symbol}</div></div><div class="card-center">${data.trump.suit.symbol}</div>`;
                trumpName.className = data.trump.suit.color;
                trumpName.innerText = `${data.trump.value.name} ${data.trump.suit.symbol}`;
            }
            
            document.getElementById('visual-shirt').style.display = data.deckCount > 1 ? 'block' : 'none';
            document.getElementById('visual-trump').style.display = data.deckCount > 0 ? 'block' : 'none';
            
            const actBtn = document.getElementById('action-btn');
            if (data.table.length > 0) {
                actBtn.style.display = 'block';
                if (data.isAttacker) {
                    const allBeaten = data.table.every(p => p.defense !== null);
                    actBtn.innerText = "Бито";
                    actBtn.style.background = allBeaten ? "#4caf50" : "#777777";
                } else {
                    actBtn.innerText = "Взять карты";
                    actBtn.style.background = "#e65100";
                }
            } else {
                actBtn.style.display = 'none';
            }
            
            const myHandDiv = document.getElementById('player-hand');
            myHandDiv.innerHTML = '';
            data.myHand.forEach((card, idx) => {
                const cardEl = document.createElement('div');
                const isTrump = data.trump && (card.suit.id === data.trump.suit.id);
                cardEl.className = `card ${card.suit.color} ${isTrump ? 'is-trump-card' : ''}`;
                cardEl.style.zIndex = idx;
                cardEl.innerHTML = `<div class="card-corner"><div>${card.value.name}</div><div>${card.suit.symbol}</div></div><div class="card-center">${card.suit.symbol}</div>`;
                cardEl.onclick = () => socket.emit('playCard', idx);
                myHandDiv.appendChild(cardEl);
            });
            
            const enemyHandDiv = document.getElementById('enemy-hand');
            enemyHandDiv.innerHTML = '';
            for(let i = 0; i < data.enemyCardCount; i++) {
                const shirt = document.createElement('div');
                shirt.className = 'card shirt';
                shirt.style.zIndex = i;
                enemyHandDiv.appendChild(shirt);
            }
            
            const tableDiv = document.getElementById('game-table');
            tableDiv.innerHTML = '';
            data.table.forEach(pair => {
                const pairDiv = document.createElement('div');
                pairDiv.className = 'card-pair';
                
                const attCard = document.createElement('div');
                const isAttTrump = data.trump && (pair.attack.suit.id === data.trump.suit.id);
                attCard.className = `card attack-card ${pair.attack.suit.color} ${isAttTrump ? 'is-trump-card' : ''}`;
                attCard.innerHTML = `<div class="card-corner"><div>${pair.attack.value.name}</div><div>${pair.attack.suit.symbol}</div></div><div class="card-center">${pair.attack.suit.symbol}</div>`;
                pairDiv.appendChild(attCard);
                
                if (pair.defense) {
                    const defCard = document.createElement('div');
                    const isDefTrump = data.trump && (pair.defense.suit.id === data.trump.suit.id);
                    defCard.className = `card defense-card ${pair.defense.suit.color} ${isDefTrump ? 'is-trump-card' : ''}`;
                    defCard.innerHTML = `<div class="card-corner"><div>${pair.defense.value.name}</div><div>${pair.defense.suit.symbol}</div></div><div class="card-center">${pair.defense.suit.symbol}</div>`;
                    pairDiv.appendChild(defCard);
                }
                tableDiv.appendChild(pairDiv);
            });
        });

        socket.on('gameOver', (data) => {
            document.getElementById('timer-box').style.display = 'none';
            const overlay = document.getElementById('overlay');
            const text = document.getElementById('overlay-text');
            overlay.style.display = 'flex';
            
            let message = data.winner === socket.id ? "Вы выиграли! 🎉" : "Вы проиграли... Дурак! 🥺";
            if (data.reason === 'timeout') {
                message += data.winner === socket.id ? " (Соперник превысил лимит времени)" : " (Время на ход истекло)";
            }
            if (data.winner === 'draw') message = "Ничья! 🤝";
            
            text.innerText = message;
        });
    </script>
</body>
</html>
