<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дурак Онлайн</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #1b5e20; color: white; font-family: sans-serif; text-align: center; }
        #status { padding: 10px; background: rgba(0,0,0,0.3); }
        .card { display: inline-block; width: 60px; height: 90px; background: white; color: black; margin: 5px; border-radius: 5px; cursor: pointer; line-height: 90px; font-weight: bold; }
        #deck-zone { margin: 20px; border: 2px solid white; display: inline-block; padding: 10px; }
    </style>
</head>
<body>
    <div id="status">Подключение к серверу...</div>
    <div id="player-hand"></div>
    <div id="deck-zone">
        <div id="trump-display">Козырь: ?</div>
        <div id="deck-count">Карт в колоде: 0</div>
    </div>

    <script>
        const socket = io({ transports: ['websocket', 'polling'] });
        
        socket.on('connect', () => {
            document.getElementById('status').innerText = "Подключено! Ожидание игры...";
        });

        socket.on('gameState', (data) => {
            document.getElementById('status').innerText = "Игра идет";
            document.getElementById('deck-count').innerText = "Карт в колоде: " + data.deckCount;
            
            // Показываем козырь
            if (data.trump) {
                document.getElementById('trump-display').innerText = 
                    "Козырь: " + data.trump.value.name + data.trump.suit.symbol;
            }

            // Отрисовка карт
            const hand = document.getElementById('player-hand');
            hand.innerHTML = '';
            data.myHand.forEach((card, idx) => {
                const el = document.createElement('div');
                el.className = 'card ' + card.suit.color;
                el.innerText = card.value.name + card.suit.symbol;
                el.onclick = () => socket.emit('playCard', idx);
                hand.appendChild(el);
            });
        });

        socket.on('connect_error', (err) => {
            document.getElementById('status').innerText = "Ошибка подключения: " + err.message;
        });
    </script>
</body>
</html>
